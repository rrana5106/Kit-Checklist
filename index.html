<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Kit Checklist</title>
  </head>

  <body>
    <header>
      <div class="classification">UNCLASSIFIED</div>
      <section class="logo-container">
        <img src="https://iconlogovector.com/uploads/images/2024/11/lg-672733d539fe5-The-British-Army.webp" alt="British Army Logo" id="army-logo" />
      </section>
      <h1 id="title">Kit Checklist</h1>
      <p class="page-description">
        A simple checklist for organising kit into Person, Bergen, and Daysack,
        helping you track packing progress.
      </p>
    </header>

    <main>
      <div class="add-item-container">
        <form id="addItemForm" autocomplete="off">
          <fieldset>
            <legend>User Option</legend>
            <label for="category">Category</label>
            <select name="category" id="category" required>
              <option value="" selected disabled>Choose the Category</option>
              <option value="Person">Person</option>
              <option value="Bergen">Bergen</option>
              <option value="Daysack">Daysack</option>
            </select>
            <label for="item-name">Item Name:</label>
            <input
              type="text"
              placeholder="Enter the item name you want to add"
              id="item-name"
              required
            />
            <input type="submit" value="Add item" />
          </fieldset>
        </form>
      </div>
      <!-- alertBox container -->
      <div class="alertBox" aria-live="polite">
        <!-- alertMsg -->
        <div class="alertMsg"></div>
      </div>
      <div class="container">
        <!-- progress bar -->
        <section>
          <fieldset>
            <legend>
              <label for="progressBar" id="progress-text"
                >Packing Progress:
              </label>
            </legend>

            <progress id="progressBar" value="0" max="100">0%</progress>
          </fieldset>
        </section>

        <!-- person kit list -->
        <section id="person">
          <h2>Person</h2>
          <div class="kit-list">
            <ul id="person-kit"></ul>
          </div>
        </section>
        <!-- bergen kit list -->
        <section id="bergen">
          <h2>Bergen</h2>
          <div class="kit-list">
            <ul id="bergen-kit"></ul>
          </div>
        </section>
        <!-- daysack kit list -->
        <section id="daysack">
          <h2>Daysack</h2>
          <div class="kit-list">
            <ul id="daysack-kit"></ul>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <span class="classification">UNCLASSIFIED</span> Copyright by RRM
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
